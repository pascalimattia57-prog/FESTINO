<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FESTINO - V.I.P. Entry</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; text-align: center; padding: 40px 15px; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 20px; display: inline-block; width: 100%; max-width: 400px; border: 2px solid #00ff88; box-shadow: 0 0 30px rgba(0,255,136,0.3); box-sizing: border-box; }
        h2 { color: #00ff88; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; text-align: center; }
        button { background: #00ff88; color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 15px; text-transform: uppercase; }
        .nascosto { display: none; }
        .prezzo-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; }
        #totaleBig { font-size: 40px; color: #00ff88; font-weight: bold; display: block; }
        label { display: block; margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>

<body>

    <div class="box">
        <h2>FESTINO</h2>

        <div id="fase1">
            <p>Codice d'invito:</p>
            <input type="text" id="codiceSegreto" placeholder="ES: FESTA_XXXX">
            <button onclick="checkCodice()">ACCEDI</button>
            <p id="errore" style="color:#ff4444; font-weight: bold;"></p>
        </div>

        <div id="fase2" class="nascosto">
            <h3>PRENOTAZIONE</h3>
            
            <label>Il tuo nome e cognome:</label>
            <input type="text" id="nomeCapo" placeholder="Nome Cognome">
            
            <label>Quanti amici porti con te?</label>
            <select id="numAmici" onchange="aggiornaPrezzo()">
                <option value="0">Nessuno (Vengo solo io)</option>
                <option value="1">1 Amico</option>
                <option value="2">2 Amici</option>
                <option value="3">3 Amici</option>
                <option value="4">4 Amici</option>
                <option value="5">5 Amici</option>
            </select>

            <label>Scrivi i loro nomi:</label>
            <input type="text" id="nomiAmici" placeholder="Nome degli amici">
            
            <div class="prezzo-card">
                <span>TOTALE DA PAGARE:</span>
                <span id="totaleBig">15€</span>
            </div>
            
            <button onclick="inviaEInizia()">PAGA E REGISTRATI</button>
        </div>
    </div>

        function checkCodice() {
            const input = document.getElementById('codiceSegreto').value.trim().toUpperCase();
            if (codiciValidi.includes(input)) {
                document.getElementById('fase1').style.display = 'none';
                document.getElementById('fase2').style.display = 'block';
            } else {
                document.getElementById('errore').innerText = "CODICE ERRATO!";
            }
        }

        function aggiornaPrezzo() {
            const numeroAmici = parseInt(document.getElementById('numAmici').value);
            const totale = prezzoSingolo + (numeroAmici * prezzoSingolo);
            document.getElementById('totaleBig').innerText = totale + "€";
        }

        function inviaEInizia() {
            const capo = document.getElementById('nomeCapo').value.trim();
            const amici = document.getElementById('nomiAmici').value.trim();
            const numeroAmici = document.getElementById('numAmici').value;
            const totaleTesto = document.getElementById('totaleBig').innerText.replace('€', '');

            if (capo === "") {
                alert("Inserisci il tuo nome!");
                return;
            }

            // Invia i dati a Google (compreso il numero di amici scelto)
            fetch(linkScript, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams({ 
                    'capo': capo, 
                    'amici': amici + " (Tot: " + (parseInt(numeroAmici)+1) + " persone)", 
                    'totale': totaleTesto 
                })
            });

            const descrizione = "FESTINO_" + capo.replace(/\s/g, '_');
            const urlPayPal = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${encodeURIComponent(emailPayPal)}&item_name=${encodeURIComponent(descrizione)}&amount=${totaleTesto}&currency_code=EUR&no_shipping=1`;

            alert("Dati salvati! Verrai ora portato su PayPal.");
            window.location.href = urlPayPal;
        }
    </script>
